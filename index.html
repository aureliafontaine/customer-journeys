<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Journey — Cuure</title>

  <!-- Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: '#0f1117',
            canvas:  '#f8f9fb',
          },
          fontFamily: {
            sans: ['Montserrat', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React 18 + Babel (no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Data -->
  <script src="data/journeys.js"></script>

  <style>
    body { margin: 0; font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    /* Horizontal scroll */
    .canvas-scroll { overflow-x: auto; }
    /* Sticky first column — left: 0 du canvas-scroll (pas de padding offset) */
    .lane-label-cell { position: sticky; left: 0; z-index: 2; }
    /* Scrollbar styling */
    .canvas-scroll::-webkit-scrollbar { height: 6px; }
    .canvas-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
    .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    /* Whitespace in text cells */
    .cell-text { white-space: pre-line; }
  </style>
</head>
<body class="bg-canvas text-gray-900 h-screen flex overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── LANE TYPE RENDERERS ────────────────────────────────────────────────

    const STEP_COLORS = [
      { bg: '#E8F5E9', text: '#2E7D32', dot: '#4CAF50' },
      { bg: '#E3F2FD', text: '#1565C0', dot: '#2196F3' },
      { bg: '#EDE7F6', text: '#4527A0', dot: '#7C3AED' },
      { bg: '#FCE4EC', text: '#880E4F', dot: '#E91E63' },
      { bg: '#FFF3E0', text: '#E65100', dot: '#EF7A1A' },
    ];

    function CellStep({ value }) {
      return (
        <span className="font-bold text-xs tracking-widest uppercase" style={{ color: '#92400E' }}>
          {value}
        </span>
      );
    }

    function CellText({ value }) {
      if (!value || value === "" || (Array.isArray(value) && value.length === 0)) return null;
      if (Array.isArray(value)) {
        return (
          <div className="flex flex-col gap-1.5">
            {value.map((item, i) => (
              <span key={i}
                className="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium
                           bg-gray-100 text-gray-700 border border-gray-200 w-fit">
                {item}
              </span>
            ))}
          </div>
        );
      }
      return <div className="cell-text text-sm text-gray-700 leading-relaxed">{value}</div>;
    }

    function CellImage({ value }) {
      if (!value) return null;
      return (
        <img
          src={value}
          alt=""
          className="w-full rounded-md object-cover"
          style={{ height: '120px' }}
          loading="lazy"
        />
      );
    }

    function CellLink({ value, onNavigate }) {
      if (!value) return null;
      return (
        <button
          onClick={() => onNavigate(value.journeyId)}
          className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium
                     bg-blue-50 text-blue-700 border border-blue-200
                     hover:bg-blue-100 hover:border-blue-300 transition-colors cursor-pointer"
        >
          <span>{value.journeyName}</span>
          <span>→</span>
        </button>
      );
    }

    function CellLinks({ value, onNavigate }) {
      if (!value || value.length === 0) return null;
      return (
        <div className="flex flex-col gap-1.5">
          {value.map(link => (
            <button
              key={link.journeyId}
              onClick={() => onNavigate(link.journeyId)}
              className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium
                         bg-orange-50 text-[#EF7A1A] border border-orange-200
                         hover:bg-orange-100 hover:border-orange-300 transition-colors cursor-pointer w-fit"
            >
              <span>{link.journeyName}</span>
              <span>→</span>
            </button>
          ))}
        </div>
      );
    }

    function isCellEmpty(type, value) {
      if (value === null || value === undefined || value === '') return true;
      if (Array.isArray(value) && value.length === 0) return true;
      return false;
    }

    // ─── LANE ROW ───────────────────────────────────────────────────────────

    function LaneRow({ lane, steps, isStep, onNavigate }) {
      const tdBase = 'border-t border-b border-gray-200';

      return (
        <tr>
          {/* Lane label — sticky left */}
          <td
            className={`lane-label-cell ${tdBase} border-l border-r border-gray-200 bg-gray-50 px-4 py-3 rounded-l-xl`}
            style={{ minWidth: '160px', maxWidth: '160px', width: '160px', verticalAlign: 'middle' }}
          >
            <span className="text-gray-500 text-xs font-semibold uppercase tracking-wide cell-text">{lane.label}</span>
          </td>

          {/* Cells */}
          {steps.map((step, stepIndex) => {
            const color = STEP_COLORS[stepIndex % STEP_COLORS.length];
            const cellValue = lane.cells[step.id];
            const isEmpty = !isStep && isCellEmpty(lane.type, cellValue);
            const isChipCell = !isStep && !isEmpty && (
              lane.type === 'links' ||
              (lane.type === 'text' && Array.isArray(cellValue))
            );
            const isLastStep = stepIndex === steps.length - 1;

            return (
              <td
                key={step.id}
                className={`${tdBase} border-r border-gray-200 p-2 align-top bg-gray-50 ${isLastStep ? 'rounded-r-xl' : ''}`}
                style={{ minWidth: '220px', maxWidth: '300px', verticalAlign: 'top' }}
              >
                <div
                  className="h-full min-h-[52px] flex items-center"
                  style={ isStep ? {
                    background: 'linear-gradient(to right, #EF7A1A 0px, #EF7A1A 4px, #FFF7ED 4px)',
                    clipPath: 'polygon(4px 0%, calc(100% - 14px) 0%, 100% 50%, calc(100% - 14px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px)',
                    filter: 'drop-shadow(1px 0 0 rgba(239,122,26,0.5)) drop-shadow(-1px 0 0 rgba(239,122,26,0.5)) drop-shadow(0 1px 0 rgba(239,122,26,0.5)) drop-shadow(0 -1px 0 rgba(239,122,26,0.5))',
                    padding: '10px 32px 10px 14px',
                  } : isEmpty ? {
                    background: 'transparent',
                  } : isChipCell ? {
                    background: 'transparent',
                    padding: '12px',
                    alignItems: 'flex-start',
                  } : {
                    backgroundColor: '#ffffff',
                    border: '1px solid #e5e7eb',
                    borderRadius: '8px',
                    padding: '12px',
                    alignItems: 'flex-start',
                  }}
                >
                  {lane.type === 'step'  && <CellStep  value={cellValue} color={color} />}
                  {lane.type === 'text'  && <CellText  value={cellValue} />}
                  {lane.type === 'image' && <CellImage value={cellValue} />}
                  {lane.type === 'link'  && <CellLink  value={cellValue} onNavigate={onNavigate} />}
                  {lane.type === 'links' && <CellLinks value={cellValue} onNavigate={onNavigate} />}
                </div>
              </td>
            );
          })}
        </tr>
      );
    }

    // ─── PROJECT PAGE ────────────────────────────────────────────────────────

    function ProjectPage() {
      const { context, objectives } = window.PROJECT;
      return (
        <div className="flex flex-col h-full overflow-y-auto">
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Customer Journey Mapping</h1>
            <p className="text-sm text-gray-400 mt-1">Cuure — Context & Objectives</p>
          </div>
          <div className="flex-1 px-8 py-8">
            <div className="grid grid-cols-2 gap-6 max-w-4xl">

              {/* Context */}
              <div className="rounded-xl border border-gray-200 overflow-hidden">
                <div className="px-5 py-3 bg-gray-900">
                  <h2 className="text-sm font-semibold text-white tracking-wide">Context</h2>
                </div>
                <div className="px-5 py-5 bg-white space-y-3">
                  {context.map((item, i) => (
                    <div key={i} className="flex gap-2.5 text-sm text-gray-700 leading-relaxed">
                      <span className="text-[#EF7A1A] font-bold flex-shrink-0 mt-0.5">→</span>
                      <span>{item}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Objectives */}
              <div className="rounded-xl border border-gray-200 overflow-hidden">
                <div className="px-5 py-3 bg-gray-900">
                  <h2 className="text-sm font-semibold text-white tracking-wide">Objectives</h2>
                </div>
                <div className="px-5 py-5 bg-white space-y-3">
                  {objectives.map((item, i) => (
                    <div key={i} className="flex gap-2.5 text-sm text-gray-700 leading-relaxed">
                      <span className="text-[#EF7A1A] font-bold flex-shrink-0 mt-0.5">→</span>
                      <span>{item}</span>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // ─── CANVAS ─────────────────────────────────────────────────────────────

    function Canvas({ journey, onNavigate }) {
      if (!journey) return (
        <div className="flex flex-1 items-center justify-center text-gray-400 text-sm">
          Journey introuvable — elle sera créée prochainement.
        </div>
      );
      const isEmpty = !journey.steps || journey.steps.length === 0;
      if (isEmpty) return (
        <div className="flex flex-col h-full">
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">{journey.name}</h1>
            <p className="text-sm text-gray-400 mt-1">Mapping en cours de construction…</p>
          </div>
          <div className="flex flex-1 items-center justify-center text-gray-300 text-sm italic">
            Les étapes seront ajoutées prochainement.
          </div>
        </div>
      );
      return (
        <div className="flex flex-col h-full">
          {/* Journey title */}
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">{journey.name}</h1>
            <p className="text-sm text-gray-400 mt-1">{journey.steps.length} étapes · {journey.lanes.length} lanes</p>
          </div>

          {/* Grid — vertical scroll sur le wrapper, horizontal scroll sur canvas-scroll */}
          <div className="flex-1 min-h-0 overflow-y-auto">
            <div className="canvas-scroll p-6">
            <table style={{ borderCollapse: 'separate', borderSpacing: '0 6px', minWidth: '100%' }}>
              <tbody>
                {journey.lanes.map(lane => (
                  <LaneRow
                    key={lane.id}
                    lane={lane}
                    steps={journey.steps}
                    isStep={lane.type === 'step'}
                    onNavigate={onNavigate}
                  />
                ))}
              </tbody>
            </table>
            </div>
          </div>
        </div>
      );
    }

    // ─── SIDEBAR ─────────────────────────────────────────────────────────────

    function Sidebar({ journeys, activeId, onSelect }) {
      const { useState } = React;

      // Collect unique groups in order of appearance
      const groups = [];
      const groupMap = {};
      const ungrouped = [];
      journeys.forEach(j => {
        if (j.group) {
          if (!groupMap[j.group]) { groupMap[j.group] = []; groups.push(j.group); }
          groupMap[j.group].push(j);
        } else {
          ungrouped.push(j);
        }
      });

      // Track open/closed folders (all open by default)
      const [openGroups, setOpenGroups] = useState(() => Object.fromEntries(groups.map(g => [g, true])));
      const toggle = g => setOpenGroups(prev => ({ ...prev, [g]: !prev[g] }));

      const btnClass = (id) => `w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${
        id === activeId ? 'bg-[#EF7A1A] text-white font-medium' : 'text-gray-400 hover:text-white hover:bg-gray-800'
      }`;

      return (
        <aside
          className="flex flex-col flex-shrink-0 border-r border-gray-800"
          style={{ width: '220px', backgroundColor: '#0f1117' }}
        >
          {/* Logo */}
          <div className="px-5 pt-6 pb-4 border-b border-gray-800">
            <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">Customer Journeys</span>
            <div className="mt-1 text-white font-bold text-sm">Cuure</div>
          </div>

          {/* Nav */}
          <nav className="flex-1 px-2 py-4 overflow-y-auto">

            {/* Overview */}
            <div className="mb-3">
              <button onClick={() => onSelect('__overview__')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${'__overview__' === activeId ? 'bg-[#EF7A1A] text-white font-medium' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                Overview
              </button>
            </div>

            <p className="px-3 mb-2 text-xs text-gray-600 uppercase tracking-wider font-medium">Journeys</p>

            {/* Ungrouped */}
            <div className="space-y-0.5 mb-1">
              {ungrouped.map(j => (
                <button key={j.id} onClick={() => onSelect(j.id)} className={btnClass(j.id)}>
                  {j.name}
                </button>
              ))}
            </div>

            {/* Groups / folders */}
            {groups.map(g => (
              <div key={g} className="mt-1">
                {/* Folder header */}
                <button
                  onClick={() => toggle(g)}
                  className="w-full flex items-center gap-1.5 px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider hover:text-gray-300 transition-colors"
                >
                  <span className="transition-transform" style={{ display: 'inline-block', transform: openGroups[g] ? 'rotate(90deg)' : 'rotate(0deg)' }}>▶</span>
                  {g}
                </button>
                {/* Children */}
                {openGroups[g] && (
                  <div className="space-y-0.5 ml-3 border-l border-gray-800 pl-2">
                    {groupMap[g].map(j => (
                      <button key={j.id} onClick={() => onSelect(j.id)} className={btnClass(j.id)}>
                        {j.name}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </nav>

          {/* Footer */}
          <div className="px-5 py-4 border-t border-gray-800">
            <span className="text-xs text-gray-700">Éditable via Claude Code</span>
          </div>
        </aside>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────

    function App() {
      const journeys = window.JOURNEYS;
      const [activeId, setActiveId] = useState(journeys[0].id);

      const activeJourney = journeys.find(j => j.id === activeId);

      return (
        <div className="flex h-screen w-screen overflow-hidden">
          <Sidebar
            journeys={journeys}
            activeId={activeId}
            onSelect={setActiveId}
          />
          <main className="flex-1 flex flex-col overflow-hidden bg-white">
            {activeId === '__overview__'
              ? <ProjectPage />
              : <Canvas key={activeId} journey={activeJourney} onNavigate={setActiveId} />
            }
          </main>
        </div>
      );
    }

    // ─── MOUNT ───────────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
