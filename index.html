<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Journey — Cuure</title>

  <!-- Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: '#0f1117',
            canvas:  '#f8f9fb',
          },
          fontFamily: {
            sans: ['Montserrat', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React 18 + Babel (no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Data -->
  <script src="data/journeys.js"></script>

  <style>
    body { margin: 0; font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    /* Horizontal scroll */
    .canvas-scroll { overflow-x: auto; }
    /* Sticky first column — left: 0 du canvas-scroll (pas de padding offset) */
    .lane-label-cell { position: sticky; left: 0; z-index: 2; }
    /* Scrollbar styling */
    .canvas-scroll::-webkit-scrollbar { height: 6px; }
    .canvas-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
    .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    /* Whitespace in text cells */
    .cell-text { white-space: pre-line; }
  </style>
</head>
<body class="bg-canvas text-gray-900 h-screen flex overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── LANE TYPE RENDERERS ────────────────────────────────────────────────

    const CHIP_STATUSES = {
      bon:     { bg: '#F0FDF4', text: '#15803D', border: '#86EFAC', dashed: false, emoji: '✅' },
      ok:      { bg: '#FEFCE8', text: '#854D0E', border: '#FDE047', dashed: false, emoji: '🟡' },
      moyen:   { bg: '#FFF7ED', text: '#92400E', border: '#FED7AA', dashed: false, emoji: '⚠️' },
      mauvais: { bg: '#FEF2F2', text: '#991B1B', border: '#FECACA', dashed: false, emoji: '❌' },
      'non existant': { bg: '#f9fafb', text: '#6b7280', border: '#d1d5db', dashed: true, emoji: '🚫', grayEmoji: true },
    };
    const CHIP_STATUS_LIST = ['bon', 'ok', 'moyen', 'mauvais', 'non existant'];

    function chipStatusName(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xffff;
      return CHIP_STATUS_LIST[h % CHIP_STATUS_LIST.length];
    }
    function chipStatus(str) { return CHIP_STATUSES[chipStatusName(str)]; }

    const FLOW_COLORS = [
      { bg: '#FFF7ED', border: '#EF7A1A' },
      { bg: '#EFF6FF', border: '#3B82F6' },
      { bg: '#F0FDF4', border: '#16A34A' },
      { bg: '#FDF4FF', border: '#9333EA' },
    ];

    const STEP_COLORS = [
      { bg: '#E8F5E9', text: '#2E7D32', dot: '#4CAF50' },
      { bg: '#E3F2FD', text: '#1565C0', dot: '#2196F3' },
      { bg: '#EDE7F6', text: '#4527A0', dot: '#7C3AED' },
      { bg: '#FCE4EC', text: '#880E4F', dot: '#E91E63' },
      { bg: '#FFF3E0', text: '#E65100', dot: '#EF7A1A' },
    ];

    function CellStep({ value, isOverview }) {
      return (
        <span className="font-bold text-xs tracking-widest uppercase" style={{ color: isOverview ? '#3730A3' : '#92400E' }}>
          {value}
        </span>
      );
    }

    function CellTable({ title, rows }) {
      // rows: [{ label, sub, price, priceOld }]
      return (
        <div>
          {title && <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">{title}</div>}
          <table className="w-full text-xs border-collapse">
            <tbody>
              {rows.map((row, i) => (
                <tr key={i} className={i < rows.length - 1 ? 'border-b border-gray-200' : ''}>
                  <td className="py-1.5 pr-3 font-medium text-gray-800 whitespace-nowrap">
                    {row.label}
                    {row.sub && <span className="block text-gray-400 font-normal">{row.sub}</span>}
                    {row.note && <span className="block text-gray-400 font-normal italic">{row.note}</span>}
                  </td>
                  <td className="py-1.5 text-right whitespace-nowrap">
                    {row.priceOld && <span className="line-through text-gray-400 mr-1">{row.priceOld}</span>}
                    {row.price && <span className="font-semibold text-gray-800">{row.price}</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function CellFlow({ steps }) {
      return (
        <div style={{
          background: 'white', border: '1px solid #e5e7eb', borderRadius: '8px',
          padding: '8px', display: 'flex', flexDirection: 'column', gap: '4px', width: '100%'
        }}>
          {steps.map((step, i) => (
            <React.Fragment key={i}>
              <span style={{
                fontSize: '12px', padding: '4px 10px', background: '#f9fafb',
                border: '1px solid #e5e7eb', borderRadius: '6px', color: '#374151',
                fontWeight: '500', textAlign: 'center', display: 'block'
              }}>
                {step}
              </span>
              {i < steps.length - 1 && (
                <span style={{ fontSize: '10px', color: '#9ca3af', textAlign: 'center' }}>↓</span>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function ChipWithPicker({ text, chipOverrides, updateChipStatus }) {
      const { useState } = React;
      const sName = chipOverrides[text] || chipStatusName(text);
      const st = CHIP_STATUSES[sName];
      const [open, setOpen] = useState(false);
      return (
        <div style={{ position: 'relative', display: 'inline-flex' }}>
          {open && <div style={{ position: 'fixed', inset: 0, zIndex: 40 }} onClick={() => setOpen(false)} />}
          <span
            onClick={() => setOpen(o => !o)}
            className="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium w-fit"
            style={{ background: st.bg, color: st.text, border: `1px ${st.dashed ? 'dashed' : 'solid'} ${st.border}`, cursor: 'pointer', userSelect: 'none' }}
          >
            <span style={st.grayEmoji ? { filter: 'grayscale(1)' } : {}}>{st.emoji}</span> {text}
          </span>
          {open && (
            <div style={{
              position: 'absolute', top: 'calc(100% + 4px)', left: 0, zIndex: 50,
              background: 'white', border: '1px solid #e5e7eb', borderRadius: '10px',
              boxShadow: '0 4px 16px rgba(0,0,0,0.12)', padding: '4px',
              display: 'flex', flexDirection: 'column', minWidth: '130px',
            }}>
              {CHIP_STATUS_LIST.map(sn => {
                const s = CHIP_STATUSES[sn];
                const isActive = sn === sName;
                return (
                  <button key={sn}
                    onClick={() => { updateChipStatus(text, sn); setOpen(false); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 10px',
                      borderRadius: '6px', border: 'none', cursor: 'pointer', fontSize: '12px',
                      fontWeight: isActive ? '600' : '500', textAlign: 'left', width: '100%',
                      background: isActive ? s.bg : 'transparent', color: isActive ? s.text : '#374151',
                    }}
                  >
                    <span style={s.grayEmoji ? { filter: 'grayscale(1)' } : {}}>{s.emoji}</span><span style={{ textTransform: 'capitalize' }}>{sn}</span>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function CellText({ value, chipOverrides, updateChipStatus }) {
      if (!value || value === "" || (Array.isArray(value) && value.length === 0)) return null;
      if (value && value.type === 'table') return <CellTable title={value.title} rows={value.rows} />;
      if (value && value.type === 'flow') return <CellFlow steps={value.steps} />;
      if (Array.isArray(value)) {
        return (
          <div className="flex flex-col gap-1.5">
            {value.map((item, i) => {
              if (item && item.type === 'flow') return <CellFlow key={i} steps={item.steps} />;
              if (typeof item === 'string' && chipOverrides !== undefined) {
                return <ChipWithPicker key={i} text={item} chipOverrides={chipOverrides} updateChipStatus={updateChipStatus} />;
              }
              const st = typeof item === 'string' ? chipStatus(item) : null;
              return (
                <span key={i}
                  className="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium w-fit"
                  style={st ? {
                    background: st.bg, color: st.text,
                    border: `1px ${st.dashed ? 'dashed' : 'solid'} ${st.border}`,
                  } : { background: '#f3f4f6', color: '#374151', border: '1px solid #e5e7eb' }}>
                  {st ? <><span style={st.grayEmoji ? { filter: 'grayscale(1)' } : {}}>{st.emoji}</span> {item}</> : item}
                </span>
              );
            })}
          </div>
        );
      }
      return <div className="cell-text text-sm text-gray-700 leading-relaxed">{value}</div>;
    }

    function EditableCell({ value, chipOverrides, updateChipStatus, onAddChip }) {
      const { useState } = React;
      const [adding, setAdding] = useState(false);
      const [draft, setDraft] = useState('');
      const confirm = () => {
        const t = draft.trim();
        if (t) onAddChip(t);
        setAdding(false); setDraft('');
      };
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', width: '100%' }}>
          <CellText value={value} chipOverrides={chipOverrides} updateChipStatus={updateChipStatus} />
          {adding ? (
            <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
              <input
                autoFocus value={draft} onChange={e => setDraft(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') confirm(); if (e.key === 'Escape') { setAdding(false); setDraft(''); } }}
                placeholder="Nom du chip…"
                style={{ fontSize: '11px', padding: '4px 8px', border: '1px solid #d1d5db', borderRadius: '6px', outline: 'none', flex: 1, fontFamily: 'inherit' }}
              />
              <button onClick={confirm} style={{ fontSize: '11px', padding: '4px 7px', background: '#EF7A1A', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer' }}>✓</button>
              <button onClick={() => { setAdding(false); setDraft(''); }} style={{ fontSize: '11px', padding: '4px 7px', background: 'transparent', color: '#9ca3af', border: 'none', cursor: 'pointer' }}>✕</button>
            </div>
          ) : (
            <button onClick={() => setAdding(true)}
              style={{ fontSize: '11px', color: '#9ca3af', background: 'transparent', border: '1px dashed #d1d5db', borderRadius: '6px', padding: '3px 8px', cursor: 'pointer', textAlign: 'left', width: 'fit-content' }}>
              + Ajouter
            </button>
          )}
        </div>
      );
    }

    function CellImage({ value }) {
      if (!value) return null;
      return (
        <img
          src={value}
          alt=""
          className="w-full rounded-md object-cover"
          style={{ height: '120px' }}
          loading="lazy"
        />
      );
    }

    function CellLink({ value, onNavigate }) {
      if (!value) return null;
      return (
        <button
          onClick={() => onNavigate(value.journeyId)}
          className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium
                     bg-blue-50 text-blue-700 border border-blue-200
                     hover:bg-blue-100 hover:border-blue-300 transition-colors cursor-pointer"
        >
          <span>{value.journeyName}</span>
          <span>→</span>
        </button>
      );
    }

    function CellLinks({ value, onNavigate }) {
      if (!value || value.length === 0) return null;
      return (
        <div className="flex flex-col gap-1.5">
          {value.map((link, i) => {
            const isData = !!link.dataPageId;
            const key = isData ? link.dataPageId : link.journeyId;
            const label = isData ? link.label : link.journeyName;
            const dest = isData ? '__data__:' + link.dataPageId : link.journeyId;
            const cls = isData
              ? "inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium bg-purple-50 text-purple-700 border border-purple-200 hover:bg-purple-100 hover:border-purple-300 transition-colors cursor-pointer w-fit"
              : "inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium bg-orange-50 text-[#EF7A1A] border border-orange-200 hover:bg-orange-100 hover:border-orange-300 transition-colors cursor-pointer w-fit";
            return (
              <button key={key} onClick={() => onNavigate(dest)} className={cls}>
                <span>{label}</span>
                <span>→</span>
              </button>
            );
          })}
        </div>
      );
    }

    function isCellEmpty(type, value) {
      if (value === null || value === undefined || value === '') return true;
      if (Array.isArray(value) && value.length === 0) return true;
      return false;
    }

    // ─── LANE ROW ───────────────────────────────────────────────────────────

    function LaneRow({ lane, steps, isStep, isOverview, onNavigate, chipOverrides, updateChipStatus, journeyId, chipAdditions, addChip }) {
      const tdBase = 'border-t border-b border-gray-200';

      return (
        <tr>
          {/* Lane label — sticky left */}
          <td
            className={`lane-label-cell ${tdBase} border-l border-r border-gray-200 bg-gray-50 px-4 py-3 rounded-l-xl`}
            style={{ minWidth: '160px', maxWidth: '160px', width: '160px', verticalAlign: 'middle' }}
          >
            <span className="text-gray-500 text-xs font-semibold uppercase tracking-wide cell-text">{lane.label}</span>
          </td>

          {/* Cells */}
          {steps.map((step, stepIndex) => {
            const cellKey = `${journeyId}:${lane.id}:${step.id}`;
            const cellValue = lane.cells[step.id] ?? (isStep ? step.label : undefined);
            const additions = (chipAdditions || {})[cellKey] || [];
            const mergedValue = Array.isArray(cellValue)
              ? [...cellValue, ...additions]
              : additions.length > 0 ? additions : cellValue;
            const isMeta = step.type === 'meta';
            const isEmpty = !isStep && isCellEmpty(lane.type, mergedValue);
            const isChipCell = !isStep && !isEmpty && (
              lane.type === 'links' ||
              (lane.type === 'text' && Array.isArray(mergedValue))
            );
            const isLastStep = stepIndex === steps.length - 1;

            return (
              <td
                key={step.id}
                className={`${tdBase} border-r border-gray-200 p-2 align-top bg-gray-50 ${isLastStep ? 'rounded-r-xl' : ''}`}
                style={{ minWidth: '220px', maxWidth: '300px', verticalAlign: 'top' }}
              >
                <div
                  className="h-full min-h-[52px] flex items-center"
                  style={ (isStep && !isMeta) ? {
                    background: isOverview
                      ? 'linear-gradient(to right, #4F46E5 0px, #4F46E5 4px, #EEF2FF 4px)'
                      : 'linear-gradient(to right, #EF7A1A 0px, #EF7A1A 4px, #FFF7ED 4px)',
                    clipPath: 'polygon(4px 0%, calc(100% - 14px) 0%, 100% 50%, calc(100% - 14px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px)',
                    filter: isOverview
                      ? 'drop-shadow(1px 0 0 rgba(79,70,229,0.5)) drop-shadow(-1px 0 0 rgba(79,70,229,0.5)) drop-shadow(0 1px 0 rgba(79,70,229,0.5)) drop-shadow(0 -1px 0 rgba(79,70,229,0.5))'
                      : 'drop-shadow(1px 0 0 rgba(239,122,26,0.5)) drop-shadow(-1px 0 0 rgba(239,122,26,0.5)) drop-shadow(0 1px 0 rgba(239,122,26,0.5)) drop-shadow(0 -1px 0 rgba(239,122,26,0.5))',
                    padding: '10px 32px 10px 14px',
                  } : (isStep && isMeta) ? {
                    background: 'transparent',
                    padding: '10px 12px',
                    justifyContent: 'center',
                  } : isEmpty ? {
                    background: 'transparent',
                  } : isChipCell ? {
                    background: 'transparent',
                    padding: '12px',
                    alignItems: 'flex-start',
                  } : {
                    backgroundColor: '#ffffff',
                    border: '1px solid #e5e7eb',
                    borderRadius: '8px',
                    padding: '12px',
                    alignItems: 'flex-start',
                  }}
                >
                  {lane.type === 'step' && !isMeta && <CellStep value={cellValue} isOverview={isOverview} />}
                  {lane.type === 'step' && isMeta  && <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide text-center">{cellValue}</span>}
                  {lane.type === 'text'  && !isOverview && <EditableCell value={mergedValue} chipOverrides={chipOverrides} updateChipStatus={updateChipStatus} onAddChip={t => addChip(cellKey, t)} />}
                  {lane.type === 'text'  &&  isOverview && <CellText value={mergedValue} chipOverrides={chipOverrides} updateChipStatus={updateChipStatus} />}
                  {lane.type === 'image' && <CellImage value={cellValue} />}
                  {lane.type === 'link'  && <CellLink  value={cellValue} onNavigate={onNavigate} />}
                  {lane.type === 'links' && <CellLinks value={cellValue} onNavigate={onNavigate} />}
                </div>
              </td>
            );
          })}
        </tr>
      );
    }

    // ─── FLOW LANE ROWS ─────────────────────────────────────────────────────

    function FlowLaneRows({ lane, steps }) {
      const sharedCells = lane.sharedCells || {};
      const flows = lane.flows || [];
      const sharedStepIds = new Set(Object.keys(sharedCells));
      const flowCount = flows.length;

      return flows.map((flow, flowIndex) => {
        const isFirstFlow = flowIndex === 0;
        const tdBase = isFirstFlow ? 'border-t border-b border-gray-200' : 'border-b border-gray-200';
        const isLastFlow = flowIndex === flows.length - 1;
        const color = FLOW_COLORS[flowIndex % FLOW_COLORS.length];
        const flowStepIds = Object.keys(flow.cells);

        return (
          <tr key={flow.id || flowIndex}>
            {/* Lane label — rowspan over all flows */}
            {isFirstFlow && (
              <td
                className={`lane-label-cell ${tdBase} border-l border-r border-gray-200 bg-gray-50 px-4 py-3 rounded-l-xl`}
                style={{ minWidth: '160px', maxWidth: '160px', width: '160px', verticalAlign: 'middle' }}
                rowSpan={flowCount}
              >
                <span className="text-gray-500 text-xs font-semibold uppercase tracking-wide cell-text">{lane.label}</span>
              </td>
            )}

            {steps.map((step, stepIndex) => {
              const isLastStep = stepIndex === steps.length - 1;

              // Shared cell — only render in first flow row (rowspan covers rest)
              if (sharedStepIds.has(step.id)) {
                if (!isFirstFlow) return null;
                return (
                  <td key={step.id}
                    className={`${tdBase} border-r border-gray-200 p-2 bg-gray-50`}
                    style={{ minWidth: '220px', maxWidth: '300px', verticalAlign: 'top' }}
                    rowSpan={flowCount}
                  >
                    <div style={{ backgroundColor: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '8px', padding: '12px', minHeight: '52px', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                      <CellText value={sharedCells[step.id]} />
                    </div>
                  </td>
                );
              }

              const isInFlow = Object.prototype.hasOwnProperty.call(flow.cells, step.id);

              if (isInFlow) {
                const cellValue = flow.cells[step.id];
                const isStart = step.id === flowStepIds[0];
                const isEnd   = step.id === flowStepIds[flowStepIds.length - 1];
                const isSingle = isStart && isEnd;

                const PAD = '10px 12px';
                let divStyle = { minHeight: '52px', display: 'flex', alignItems: 'center', justifyContent: 'center', boxSizing: 'border-box', height: '100%', background: '#ffffff', padding: PAD };

                if (flow.standalone || isSingle) {
                  Object.assign(divStyle, { background: 'transparent' });
                } else if (isStart) {
                  Object.assign(divStyle, { borderLeft: '1px solid #e5e7eb', borderTop: '1px solid #e5e7eb', borderBottom: '1px solid #e5e7eb', borderRadius: '8px 0 0 8px' });
                } else if (isEnd) {
                  Object.assign(divStyle, { borderRight: '1px solid #e5e7eb', borderTop: '1px solid #e5e7eb', borderBottom: '1px solid #e5e7eb', borderRadius: '0 8px 8px 0' });
                } else {
                  Object.assign(divStyle, { borderTop: '1px solid #e5e7eb', borderBottom: '1px solid #e5e7eb' });
                }

                return (
                  <td key={step.id}
                    className={`${tdBase} border-r border-gray-200 bg-gray-50 ${isLastStep && isLastFlow ? 'rounded-r-xl' : ''}`}
                    style={{ minWidth: '220px', maxWidth: '300px', verticalAlign: 'middle', padding: (flow.standalone || isSingle) ? '8px' : 0 }}
                  >
                    <div style={divStyle}>
                      <span className="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700 border border-gray-200">{cellValue}</span>
                    </div>
                  </td>
                );
              }

              // Empty cell
              return (
                <td key={step.id}
                  className={`${tdBase} border-r border-gray-200 p-2 bg-gray-50 ${isLastStep && isLastFlow ? 'rounded-r-xl' : ''}`}
                  style={{ minWidth: '220px', maxWidth: '300px', verticalAlign: 'top' }}
                >
                  <div style={{ minHeight: '52px', background: 'transparent' }} />
                </td>
              );
            })}
          </tr>
        );
      });
    }

    // ─── PROJECT PAGE ────────────────────────────────────────────────────────

    function ProjectPage() {
      const { context, objectives } = window.PROJECT;
      return (
        <div className="flex flex-col h-full overflow-y-auto">
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Customer Journey Mapping</h1>
            <p className="text-sm text-gray-400 mt-1">Cuure — Context & Objectives</p>
          </div>
          <div className="flex-1 px-8 py-8">
            <div className="grid grid-cols-2 gap-6 max-w-4xl">

              {/* Context */}
              <div className="rounded-xl border border-gray-200 overflow-hidden">
                <div className="px-5 py-3 bg-gray-900">
                  <h2 className="text-sm font-semibold text-white tracking-wide">Context</h2>
                </div>
                <div className="px-5 py-5 bg-white space-y-3">
                  {context.map((item, i) => (
                    <div key={i} className="flex gap-2.5 text-sm text-gray-700 leading-relaxed">
                      <span className="text-[#EF7A1A] font-bold flex-shrink-0 mt-0.5">→</span>
                      <span>{item}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Objectives */}
              <div className="rounded-xl border border-gray-200 overflow-hidden">
                <div className="px-5 py-3 bg-gray-900">
                  <h2 className="text-sm font-semibold text-white tracking-wide">Objectives</h2>
                </div>
                <div className="px-5 py-5 bg-white space-y-3">
                  {objectives.map((item, i) => (
                    <div key={i} className="flex gap-2.5 text-sm text-gray-700 leading-relaxed">
                      <span className="text-[#EF7A1A] font-bold flex-shrink-0 mt-0.5">→</span>
                      <span>{item}</span>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // ─── DATA PAGE ───────────────────────────────────────────────────────────

    function DataCrossTab({ section }) {
      return (
        <div className="rounded-xl border border-gray-200 overflow-hidden">
          {section.title && (
            <div className="px-5 py-3 bg-gray-900">
              <h2 className="text-sm font-semibold text-white tracking-wide">{section.title}</h2>
              {section.subtitle && <p className="text-xs text-gray-400 mt-0.5">{section.subtitle}</p>}
            </div>
          )}
          <div className="overflow-x-auto">
            <table className="w-full border-collapse text-sm">
              <thead>
                <tr className="bg-gray-50 border-b border-gray-200">
                  <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide w-40">
                    {section.rowLabel || ''}
                  </th>
                  {section.columns.map((col, i) => (
                    <th key={i} className="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">
                      {col}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {section.rows.map((row, i) => (
                  <tr key={i} className={i < section.rows.length - 1 ? 'border-b border-gray-100' : ''}>
                    <td className="px-4 py-3 font-medium text-gray-800 bg-gray-50 border-r border-gray-200">
                      {row.label}
                      {row.sub && <span className="block text-xs text-gray-400 font-normal">{row.sub}</span>}
                    </td>
                    {row.values.map((val, j) => (
                      <td key={j} className="px-4 py-3 text-center text-gray-700 font-medium">
                        {val !== null && val !== undefined && val !== '' ? val : <span className="text-gray-300">—</span>}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function DataPage({ page, onBack }) {
      return (
        <div className="flex flex-col h-full overflow-y-auto">
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <button onClick={onBack} className="text-xs text-gray-400 hover:text-gray-600 mb-3 flex items-center gap-1 transition-colors">
              ← Back
            </button>
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">{page.title}</h1>
            {page.subtitle && <p className="text-sm text-gray-400 mt-1">{page.subtitle}</p>}
          </div>
          <div className="flex-1 px-8 py-8 space-y-6">
            {page.sections.map((section, i) => (
              section.type === 'crosstab' ? <DataCrossTab key={i} section={section} /> : null
            ))}
          </div>
        </div>
      );
    }

    // ─── CANVAS ─────────────────────────────────────────────────────────────

    function Canvas({ journey, onNavigate, chipOverrides, updateChipStatus, chipAdditions, addChip }) {
      if (!journey) return (
        <div className="flex flex-1 items-center justify-center text-gray-400 text-sm">
          Journey introuvable — elle sera créée prochainement.
        </div>
      );
      const isOverview = journey.id === 'journey-cx';
      const isEmpty = !journey.steps || journey.steps.length === 0;
      if (isEmpty) return (
        <div className="flex flex-col h-full">
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">{journey.name}</h1>
            <p className="text-sm text-gray-400 mt-1">Mapping en cours de construction…</p>
          </div>
          <div className="flex flex-1 items-center justify-center text-gray-300 text-sm italic">
            Les étapes seront ajoutées prochainement.
          </div>
        </div>
      );
      return (
        <div className="flex flex-col h-full">
          {/* Journey title */}
          <div className="px-8 pt-8 pb-5 border-b border-gray-200 bg-white flex-shrink-0">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">{journey.name}</h1>
            <p className="text-sm text-gray-400 mt-1">{journey.steps.length} étapes · {journey.lanes.length} lanes</p>
          </div>

          {/* Grid — vertical scroll sur le wrapper, horizontal scroll sur canvas-scroll */}
          <div className="flex-1 min-h-0 overflow-y-auto">
            <div className="canvas-scroll p-6">
            <table style={{ borderCollapse: 'separate', borderSpacing: '0 0', minWidth: '100%' }}>
              <tbody>
                {(() => {
                  const rows = [];
                  journey.lanes.forEach((lane, i) => {
                    if (lane.type === 'flow-lane') {
                      rows.push(...FlowLaneRows({ lane, steps: journey.steps }));
                    } else {
                      rows.push(
                        <LaneRow key={lane.id} lane={lane} steps={journey.steps} isStep={lane.type === 'step'} isOverview={isOverview} onNavigate={onNavigate} chipOverrides={chipOverrides} updateChipStatus={updateChipStatus} journeyId={journey.id} chipAdditions={chipAdditions} addChip={addChip} />
                      );
                    }
                    rows.push(
                      <tr key={`spacer-${i}`}><td colSpan={journey.steps.length + 1} style={{ height: '6px', padding: 0, border: 'none' }} /></tr>
                    );
                  });
                  return rows;
                })()}
              </tbody>
            </table>
            </div>
          </div>
        </div>
      );
    }

    // ─── SIDEBAR ─────────────────────────────────────────────────────────────

    function Sidebar({ journeys, activeId, onSelect, editMode }) {
      const { useState, useEffect } = React;

      // Collect unique groups in order of appearance
      const groups = [];
      const groupMap = {};
      const ungrouped = [];
      journeys.forEach(j => {
        if (j.group) {
          if (!groupMap[j.group]) { groupMap[j.group] = []; groups.push(j.group); }
          groupMap[j.group].push(j);
        } else {
          ungrouped.push(j);
        }
      });

      // Accordion: track the single open group (null = all closed)
      const [openGroup, setOpenGroup] = useState(null);
      const toggle = g => setOpenGroup(prev => prev === g ? null : g);

      // Auto-open the group of the active journey
      useEffect(() => {
        const activeJourney = journeys.find(j => j.id === activeId);
        if (activeJourney && activeJourney.group) setOpenGroup(activeJourney.group);
      }, [activeId]);

      const btnClass = (id) => `w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${
        id === activeId ? 'bg-[#EF7A1A] text-white font-medium' : 'text-gray-400 hover:text-white hover:bg-gray-800'
      }`;

      return (
        <aside
          className="flex flex-col flex-shrink-0 border-r border-gray-800"
          style={{ width: '220px', backgroundColor: '#0f1117' }}
        >
          {/* Logo */}
          <div className="px-5 pt-6 pb-4 border-b border-gray-800">
            <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">Customer Journeys</span>
            <div className="mt-1 text-white font-bold text-sm">Cuure</div>
          </div>

          {/* Nav */}
          <nav className="flex-1 px-2 py-4 overflow-y-auto">




            {/* Ungrouped */}
            <div className="space-y-0.5 mb-1">
              {ungrouped.map(j => (
                <button key={j.id} onClick={() => onSelect(j.id)} className={btnClass(j.id)}>
                  {j.name}
                </button>
              ))}
            </div>

            {/* Groups / folders */}
            {groups.map(g => (
              <div key={g} className="mt-1">
                {/* Folder header */}
                <button
                  onClick={() => toggle(g)}
                  className="w-full flex items-center gap-1.5 px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider hover:text-gray-300 transition-colors"
                >
                  <span className="transition-transform" style={{ display: 'inline-block', transform: openGroup === g ? 'rotate(90deg)' : 'rotate(0deg)' }}>▶</span>
                  {g}
                </button>
                {/* Children */}
                {openGroup === g && (
                  <div className="space-y-0.5 ml-3 border-l border-gray-800 pl-2">
                    {groupMap[g].map(j => (
                      <button key={j.id} onClick={() => onSelect(j.id)} className={btnClass(j.id)}>
                        {j.name}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}

            {/* Data section */}
            <div className="mt-4">
              <p className="px-3 mb-2 text-xs text-gray-600 uppercase tracking-wider font-medium">Data</p>
              <div className="space-y-0.5">
                <button onClick={() => onSelect('__overview__')} className={btnClass('__overview__')}>
                  Context & Objectives
                </button>
                {(window.DATA_PAGES || []).map(p => (
                  <button key={p.id} onClick={() => onSelect('__data__:' + p.id)} className={btnClass('__data__:' + p.id)}>
                    {p.name || p.title}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* Footer */}
          <div className="px-5 py-4 border-t border-gray-800">
            {editMode
              ? <span className="text-xs text-[#EF7A1A]">✎ Mode édition actif</span>
              : <span className="text-xs text-gray-700">Éditable via Claude Code</span>
            }
          </div>
        </aside>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────

    function App() {
      const { useState, useEffect } = React;
      const journeys = window.JOURNEYS;
      const [activeId, setActiveId] = useState(journeys[0].id);

      // ── Edit mode (owner-only, toggled via Ctrl+Shift+E) ──────────────────
      const [editMode, setEditMode] = useState(() => localStorage.getItem('cuure-edit-mode') === 'true');
      useEffect(() => {
        const onKey = (e) => {
          if (e.ctrlKey && e.shiftKey && e.key === 'E') {
            setEditMode(prev => {
              const next = !prev;
              localStorage.setItem('cuure-edit-mode', next);
              return next;
            });
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // ── Chip statuses (overrides) ─────────────────────────────────────────
      const [chipOverrides, setChipOverrides] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cuure-chip-statuses') || '{}'); } catch { return {}; }
      });
      const updateChipStatus = (key, sName) => {
        setChipOverrides(prev => {
          const next = { ...prev, [key]: sName };
          localStorage.setItem('cuure-chip-statuses', JSON.stringify(next));
          return next;
        });
      };

      // ── Chip additions ────────────────────────────────────────────────────
      const [chipAdditions, setChipAdditions] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cuure-chip-additions') || '{}'); } catch { return {}; }
      });
      const addChip = (cellKey, text) => {
        setChipAdditions(prev => {
          const next = { ...prev, [cellKey]: [...(prev[cellKey] || []), text] };
          localStorage.setItem('cuure-chip-additions', JSON.stringify(next));
          return next;
        });
      };

      const activeJourney = journeys.find(j => j.id === activeId);
      const isDataPage = activeId.startsWith('__data__:');
      const activeDataPage = isDataPage
        ? (window.DATA_PAGES || []).find(p => p.id === activeId.slice('__data__:'.length))
        : null;

      // Only expose edit props when edit mode is active
      const editProps = editMode ? { chipOverrides, updateChipStatus, chipAdditions, addChip } : { chipOverrides };

      return (
        <div className="flex h-screen w-screen overflow-hidden">
          <Sidebar journeys={journeys} activeId={activeId} onSelect={setActiveId} editMode={editMode} />
          <main className="flex-1 flex flex-col overflow-hidden bg-white">
            {activeId === '__overview__'
              ? <ProjectPage />
              : isDataPage && activeDataPage
              ? <DataPage page={activeDataPage} onBack={() => setActiveId(journeys[0].id)} />
              : <Canvas key={activeId} journey={activeJourney} onNavigate={setActiveId} {...editProps} />
            }
          </main>
        </div>
      );
    }

    // ─── MOUNT ───────────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
