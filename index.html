<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Journey Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 40px 48px 32px;
      border-bottom: 1px solid #1e1e2e;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f8fafc;
    }
    header p {
      margin-top: 6px;
      font-size: 14px;
      color: #64748b;
    }
    .last-updated {
      margin-top: 4px;
      font-size: 12px;
      color: #374151;
    }

    /* PROGRESS BAR */
    .journey-progress {
      display: flex;
      align-items: center;
      padding: 24px 48px;
      gap: 0;
      overflow-x: auto;
      border-bottom: 1px solid #1e1e2e;
    }
    .progress-step {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .progress-step:hover { background: #1e1e2e; }
    .progress-step.active { background: #1e1e2e; }
    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .step-label {
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }
    .progress-step.active .step-label { color: #f8fafc; }
    .progress-arrow {
      color: #1e293b;
      font-size: 18px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    /* MAIN CONTENT */
    .stage-detail {
      padding: 40px 48px;
      max-width: 1400px;
    }

    .stage-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 36px;
    }
    .stage-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .stage-title h2 {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
    }
    .stage-title p {
      margin-top: 6px;
      font-size: 14px;
      color: #64748b;
      max-width: 600px;
    }

    /* EMOTION */
    .emotion-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
      padding: 16px 20px;
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      width: fit-content;
    }
    .emotion-label-text {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .emotion-faces {
      display: flex;
      gap: 6px;
    }
    .face {
      font-size: 20px;
      opacity: 0.2;
      transition: opacity 0.2s;
    }
    .face.active { opacity: 1; }
    .emotion-word {
      font-size: 13px;
      font-weight: 600;
      color: #f8fafc;
      margin-left: 4px;
    }

    /* GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 20px 22px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .card-icon {
      font-size: 16px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #64748b;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: #1e1e2e;
      color: #94a3b8;
      border: 1px solid #2a2a3e;
    }
    .tag.colored {
      color: #f8fafc;
    }

    /* NAV BUTTONS */
    .stage-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px 40px;
      border-top: 1px solid #1e1e2e;
      margin-top: 8px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid #1e1e2e;
      background: transparent;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: #1e1e2e; color: #f8fafc; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn:disabled:hover { background: transparent; color: #94a3b8; }

    /* ALL STAGES VIEW */
    .all-stages {
      padding: 32px 48px;
      overflow-x: auto;
    }
    .swimlanes {
      min-width: 900px;
    }
    .swimlane-row {
      display: grid;
      border-bottom: 1px solid #1e1e2e;
      min-height: 60px;
    }
    .swimlane-row:last-child { border-bottom: none; }
    .lane-label {
      padding: 16px 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #374151;
      background: #0a0a10;
      border-right: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      min-width: 120px;
      max-width: 120px;
    }
    .lane-cell {
      padding: 12px 16px;
      border-right: 1px solid #1e1e2e;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px;
      align-content: flex-start;
    }
    .lane-cell:last-child { border-right: none; }
    .swimlane-header-row {
      display: grid;
      background: #0a0a10;
      border-bottom: 1px solid #1e1e2e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .stage-col-header {
      padding: 14px 16px;
      border-right: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stage-col-header:last-child { border-right: none; }
    .stage-col-name {
      font-size: 13px;
      font-weight: 600;
      color: #f8fafc;
    }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex;
      gap: 8px;
      padding: 0 48px 0;
      margin-bottom: 0;
    }
    .toggle-btn {
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid #1e1e2e;
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      background: #1e1e2e;
      color: #f8fafc;
      border-color: #2a2a3e;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid #1e1e2e;
    }

    /* EMPTY / LOADING */
    .loading {
      padding: 80px 48px;
      color: #374151;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1 id="meta-title">Customer Journey Map</h1>
  <p id="meta-subtitle"></p>
  <p class="last-updated" id="meta-date"></p>
</header>

<div class="toolbar">
  <div class="journey-progress" id="progress-bar" style="padding:0;border:none;"></div>
  <div class="view-toggle">
    <button class="toggle-btn active" id="btn-detail" onclick="setView('detail')">Vue détail</button>
    <button class="toggle-btn" id="btn-swimlane" onclick="setView('swimlane')">Vue globale</button>
  </div>
</div>

<div id="view-detail">
  <div class="stage-detail" id="stage-content"></div>
  <div class="stage-nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Précédent</button>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">Suivant →</button>
  </div>
</div>

<div id="view-swimlane" style="display:none;">
  <div class="all-stages" id="swimlane-content"></div>
</div>

<script>
  let data = null;
  let currentIndex = 0;
  let currentView = 'detail';

  const EMOTION_FACES = ['😞', '😕', '😐', '🙂', '😄'];

  async function loadData() {
    try {
      const res = await fetch('data/journey.json?v=' + Date.now());
      data = await res.json();
      init();
    } catch (e) {
      document.body.innerHTML += '<p style="padding:48px;color:#f43f5e">Erreur de chargement des données.</p>';
    }
  }

  function init() {
    document.getElementById('meta-title').textContent = data.meta.title;
    document.getElementById('meta-subtitle').textContent = data.meta.subtitle;
    document.getElementById('meta-date').textContent = 'Dernière mise à jour : ' + data.meta.lastUpdated;
    renderProgressBar();
    renderStage(currentIndex);
    renderSwimlane();
  }

  function renderProgressBar() {
    const bar = document.getElementById('progress-bar');
    bar.innerHTML = data.stages.map((s, i) => `
      <div class="progress-step ${i === currentIndex ? 'active' : ''}" onclick="goToStage(${i})">
        <div class="step-dot" style="background:${s.color}22; color:${s.color}">${s.emoji}</div>
        <span class="step-label">${s.name}</span>
      </div>
      ${i < data.stages.length - 1 ? '<span class="progress-arrow">›</span>' : ''}
    `).join('');
  }

  function renderStage(index) {
    const s = data.stages[index];
    const content = document.getElementById('stage-content');

    const emotionFaces = EMOTION_FACES.map((f, i) =>
      `<span class="face ${i < s.emotion ? 'active' : ''}">${f}</span>`
    ).join('');

    content.innerHTML = `
      <div class="stage-header">
        <div class="stage-icon" style="background:${s.color}22">${s.emoji}</div>
        <div class="stage-title">
          <h2 style="color:${s.color}">${s.name}</h2>
          <p>${s.goal}</p>
        </div>
      </div>

      <div class="emotion-bar">
        <span class="emotion-label-text">Émotion client</span>
        <div class="emotion-faces">${emotionFaces}</div>
        <span class="emotion-word" style="color:${s.color}">${s.emotionLabel}</span>
      </div>

      <div class="cards-grid">
        <div class="card">
          <div class="card-header">
            <span class="card-icon">🎯</span>
            <span class="card-title">Touchpoints</span>
          </div>
          <div class="tag-list">
            ${s.touchpoints.map(t => `<span class="tag colored" style="background:${s.color}18;border-color:${s.color}33;color:${s.color}">${t}</span>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-icon">📡</span>
            <span class="card-title">Canaux</span>
          </div>
          <div class="tag-list">
            ${s.channels.map(c => `<span class="tag">${c}</span>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-icon">⚠️</span>
            <span class="card-title">Points de friction</span>
          </div>
          <div class="tag-list">
            ${s.painPoints.map(p => `<span class="tag" style="background:#f43f5e11;border-color:#f43f5e22;color:#f87171">${p}</span>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-icon">💡</span>
            <span class="card-title">Opportunités</span>
          </div>
          <div class="tag-list">
            ${s.opportunities.map(o => `<span class="tag" style="background:#22c55e11;border-color:#22c55e22;color:#4ade80">${o}</span>`).join('')}
          </div>
        </div>
      </div>
    `;

    document.getElementById('btn-prev').disabled = index === 0;
    document.getElementById('btn-next').disabled = index === data.stages.length - 1;
  }

  function renderSwimlane() {
    const container = document.getElementById('swimlane-content');
    const stages = data.stages;
    const colCount = stages.length + 1;
    const gridTemplate = `120px repeat(${stages.length}, 1fr)`;

    const rows = [
      { label: 'Touchpoints', key: 'touchpoints' },
      { label: 'Canaux', key: 'channels' },
      { label: 'Émotion', key: null },
      { label: 'Frictions', key: 'painPoints' },
      { label: 'Opportunités', key: 'opportunities' },
    ];

    const headerHTML = `
      <div class="swimlane-header-row" style="grid-template-columns:${gridTemplate}">
        <div class="lane-label"></div>
        ${stages.map(s => `
          <div class="stage-col-header">
            <span>${s.emoji}</span>
            <span class="stage-col-name" style="color:${s.color}">${s.name}</span>
          </div>
        `).join('')}
      </div>
    `;

    const rowsHTML = rows.map(row => `
      <div class="swimlane-row" style="grid-template-columns:${gridTemplate}">
        <div class="lane-label">${row.label}</div>
        ${stages.map(s => {
          if (!row.key) {
            const faces = EMOTION_FACES.map((f, i) =>
              `<span style="opacity:${i < s.emotion ? 1 : 0.15};font-size:16px">${f}</span>`
            ).join('');
            return `<div class="lane-cell" style="align-items:center;gap:3px">${faces} <span style="font-size:11px;color:${s.color};margin-left:4px">${s.emotionLabel}</span></div>`;
          }
          const color = row.key === 'painPoints' ? '#f87171' : row.key === 'opportunities' ? '#4ade80' : null;
          return `<div class="lane-cell">${s[row.key].map(item =>
            `<span class="tag" style="${color ? `color:${color};` : ''}">${item}</span>`
          ).join('')}</div>`;
        }).join('')}
      </div>
    `).join('');

    container.innerHTML = `<div class="swimlanes">${headerHTML}${rowsHTML}</div>`;
  }

  function goToStage(index) {
    currentIndex = index;
    renderProgressBar();
    renderStage(index);
  }

  function navigate(dir) {
    const newIndex = currentIndex + dir;
    if (newIndex >= 0 && newIndex < data.stages.length) {
      goToStage(newIndex);
    }
  }

  function setView(view) {
    currentView = view;
    document.getElementById('view-detail').style.display = view === 'detail' ? 'block' : 'none';
    document.getElementById('view-swimlane').style.display = view === 'swimlane' ? 'block' : 'none';
    document.getElementById('btn-detail').classList.toggle('active', view === 'detail');
    document.getElementById('btn-swimlane').classList.toggle('active', view === 'swimlane');
  }

  loadData();
</script>
</body>
</html>
